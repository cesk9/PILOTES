name: Replace Text in M3U8
on:
  schedule:
    - cron: '0 * * * *' # Ejecutar cada hora
  push:
    branches: [ main ]

jobs:
  replace-text:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: crey D/replace-in-files-action@v1
      with:
        path: 'https://raw.githubusercontent.com/cesk9/PILOTES/main/playlist.m3u8' # Ruta de tu archivo
        search: 'Spn.png'
        replace: '1.png'
        encoding: 'utf-8'
    - uses: stefanzweifel/git-auto-commit-action@v4
      with:
        commit_message: Actualizar M3U8 automáticamente
        
